<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Metadata Summarizer</title>
    <center>
    <head>
     <span style="
                  color: red;
                  font-size: 50px;
                  font-family: 'Segoe UI', 'Trebuchet MS', 'Verdana', sans-serif;
                  font-weight: 700;
                  letter-spacing: 4px;
                  text-transform: uppercase;
                  ">
                  YT CONCEPT
     </span>
    </center>
    </head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f7f7;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: 50px auto;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 90%;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .buttons {
            margin-top: 10px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px;
        }

        .btn-output {
            background-color: #007bff;
            color: white;
        }

        .btn-ai {
            background-color: #28a745;
            color: white;
        }

        textarea {
            width: 100%;
            height: 250px;
            margin-top: 15px;
            padding: 15px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        h3 {
            margin-top: 30px;
        }

        .error {
            color: red;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <form method="post">
        <!-- Big centered URL input -->
        <input type="text" name="video_url" placeholder="▶️ Paste YouTube link here..." required>

        <!-- Buttons -->
        <div class="buttons">
            <button type="submit" class="btn-output">
                Get Video (Title)
            </button>

            <button type="submit" name="use_ai" value="on" class="btn-ai">
                Get Summarise (AI)
            </button>
        </div>
    </form>

    {% if output %}
        <h3>Video Details</h3>
        <textarea readonly>{{ output }}</textarea>
    {% endif %}

    {% if summary %}
        <h3>AI Summary & Concepts</h3>
        <textarea readonly>{{ summary }}</textarea>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

</div>

</body>
</html>
